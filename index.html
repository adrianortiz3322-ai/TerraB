<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Terraria Web</title>
<script src="https://cdn.jsdelivr.net/npm/phaser@3.70.0/dist/phaser.js"></script>

<style>
body{margin:0;overflow:hidden;background:#87CEEB;font-family:sans-serif}

#hud{
position:absolute;
top:10px;
left:10px;
color:white;
font-size:20px;
z-index:2
}

#inventory{
position:absolute;
bottom:10px;
left:50%;
transform:translateX(-50%);
display:flex;
gap:4px;
z-index:2
}

.slot{
width:40px;
height:40px;
border:2px solid white;
background:rgba(0,0,0,0.4)
}

#controls{
position:absolute;
bottom:80px;
left:20px;
z-index:2
}

.btn{
width:60px;
height:60px;
background:rgba(0,0,0,0.4);
border-radius:50%;
color:white;
font-size:30px;
display:flex;
align-items:center;
justify-content:center;
margin:5px
}

#jump{
position:absolute;
right:30px;
bottom:80px
}
</style>
</head>

<body>

<div id="hud">❤️ <span id="hp">100</span></div>

<div id="inventory"></div>

<div id="controls">
<div class="btn" id="left">◀</div>
<div class="btn" id="right">▶</div>
</div>

<div class="btn" id="jump">⬆</div>

<script>

const TILE=32
const WORLD_W=200
const WORLD_H=200
const SURFACE=95

let blocks
let enemies=[]
let animals=[]
let bullets=[]
let rain=[]

let player
let hp=100

let moveLeft=false
let moveRight=false

let time=0

const config={
type:Phaser.AUTO,
width:window.innerWidth,
height:window.innerHeight,
physics:{
default:"arcade",
arcade:{gravity:{y:900}}
},
scene:{preload,create,update}
}

new Phaser.Game(config)

function preload(){

this.load.image("grass","https://labs.phaser.io/assets/tilemaps/tiles/grass-1.png")
this.load.image("dirt","https://labs.phaser.io/assets/sprites/crate.png")
this.load.image("stone","https://labs.phaser.io/assets/sprites/stone.png")

this.load.image("enemy","https://labs.phaser.io/assets/sprites/zombie.png")
this.load.image("bunny","https://labs.phaser.io/assets/sprites/bunny.png")

this.load.image("arrow","https://labs.phaser.io/assets/sprites/bullets/bullet7.png")

this.load.spritesheet(
"player",
"https://labs.phaser.io/assets/sprites/dude.png",
{frameWidth:32,frameHeight:48}
)

}

function create(){

blocks=this.physics.add.staticGroup()

generateWorld.call(this)

player=this.physics.add.sprite(200,(SURFACE-2)*TILE,"player")

player.setCollideWorldBounds(true)

this.physics.add.collider(player,blocks)

this.cameras.main.startFollow(player)
this.cameras.main.setZoom(2)

spawnEnemies.call(this)
spawnAnimals.call(this)

createInventory()

setupControls()

this.input.on("pointerdown",()=>shoot.call(this))

}

function generateWorld(){

for(let x=0;x<WORLD_W;x++){

let height=SURFACE+Math.floor(Math.sin(x*0.2)*5)

for(let y=0;y<WORLD_H;y++){

let type="air"

if(y==height) type="grass"
else if(y>height && y<height+5) type="dirt"
else if(y>=height+5) type="stone"

if(Math.random()<0.04 && y==height){
this.add.rectangle(x*TILE,(y-1)*TILE,20,40,0x228B22)
}

if(Math.random()<0.02 && y==height){
this.add.circle(x*TILE,(y-1)*TILE,6,0xff00ff)
}

if(Math.random()<0.05 && y>height+5){
type="air"
}

if(type!="air"){
blocks.create(x*TILE,y*TILE,type).setOrigin(0)
}

}

}

}

function spawnAnimals(){

for(let i=0;i<10;i++){

let a=this.physics.add.sprite(
Phaser.Math.Between(0,WORLD_W*TILE),
(SURFACE-2)*TILE,
"bunny"
)

this.physics.add.collider(a,blocks)

animals.push(a)

}

}

function spawnEnemies(){

for(let i=0;i<6;i++){

let e=this.physics.add.sprite(
Phaser.Math.Between(0,WORLD_W*TILE),
(SURFACE-2)*TILE,
"enemy"
)

this.physics.add.collider(e,blocks)

enemies.push(e)

}

}

function shoot(){

let b=this.physics.add.sprite(player.x,player.y,"arrow")

b.setVelocityX(player.flipX?-500:500)

bullets.push(b)

}

function createInventory(){

let inv=document.getElementById("inventory")

for(let i=0;i<10;i++){

let s=document.createElement("div")
s.className="slot"

inv.appendChild(s)

}

}

function update(){

time+=0.002

this.cameras.main.setBackgroundColor(
Phaser.Display.Color.HSVToRGB(
0.6,
0.4,
0.7+Math.sin(time)*0.3
)
)

if(moveLeft){
player.setVelocityX(-200)
player.flipX=true
}
else if(moveRight){
player.setVelocityX(200)
player.flipX=false
}
else{
player.setVelocityX(0)
}

animals.forEach(a=>{
a.setVelocityX(Math.sin(Date.now()/500)*20)
})

enemies.forEach(e=>{

let dir=player.x<e.x?-1:1

e.setVelocityX(dir*40)

if(Phaser.Math.Distance.Between(e.x,e.y,player.x,player.y)<40){
hp-=0.1
}

})

if(Math.random()<0.1){

let drop=this.add.rectangle(
player.x+Phaser.Math.Between(-400,400),
player.y-400,
2,
10,
0x66ccff
)

rain.push(drop)

}

rain.forEach(r=>{
r.y+=10
})

document.getElementById("hp").innerText=Math.floor(hp)

}

function setupControls(){

document.getElementById("left").ontouchstart=()=>moveLeft=true
document.getElementById("left").ontouchend=()=>moveLeft=false

document.getElementById("right").ontouchstart=()=>moveRight=true
document.getElementById("right").ontouchend=()=>moveRight=false

document.getElementById("jump").ontouchstart=()=>{
if(player.body.touching.down){
player.setVelocityY(-450)
}
}

}

</script>
</body>
</html>
