<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Web Terraria</title>

<script src="https://cdn.jsdelivr.net/npm/phaser@3.70.0/dist/phaser.js"></script>

<style>

body{
margin:0;
overflow:hidden;
background:black;
font-family:sans-serif;
}

#hud{
position:absolute;
top:10px;
left:10px;
color:white;
z-index:10;
}

#inventory{
position:absolute;
bottom:10px;
left:50%;
transform:translateX(-50%);
display:flex;
gap:5px;
}

.slot{
width:50px;
height:50px;
background:rgba(0,0,0,0.5);
border:2px solid white;
color:white;
display:flex;
align-items:center;
justify-content:center;
}

#controls{
position:absolute;
bottom:30px;
left:20px;
}

.btn{
width:70px;
height:70px;
background:rgba(0,0,0,0.4);
border-radius:50%;
display:flex;
align-items:center;
justify-content:center;
color:white;
font-size:30px;
margin:5px;
}

#jump{
position:absolute;
right:30px;
bottom:60px;
}

</style>
</head>

<body>

<div id="hud">
❤️ Vida: <span id="hp">100</span>
</div>

<div id="inventory">
<div class="slot" id="wood">0</div>
<div class="slot" id="stone">0</div>
</div>

<div id="controls">
<div class="btn" id="left">◀</div>
<div class="btn" id="right">▶</div>
</div>

<div class="btn" id="jump">⬆</div>

<script>

const TILE=32
const WORLD=200

let map=[]
let blocks=[]
let player
let animals=[]
let hp=100

let inv={
wood:0,
stone:0
}

const config={
type:Phaser.AUTO,
width:window.innerWidth,
height:window.innerHeight,
physics:{
default:"arcade",
arcade:{gravity:{y:600}}
},
scene:{preload,create,update}
}

new Phaser.Game(config)

function preload(){

this.load.image("grass","https://labs.phaser.io/assets/sprites/block.png")
this.load.image("dirt","https://labs.phaser.io/assets/sprites/crate.png")
this.load.image("stone","https://labs.phaser.io/assets/sprites/stone.png")
this.load.image("tree","https://labs.phaser.io/assets/sprites/palm-tree.png")
this.load.image("player","https://labs.phaser.io/assets/sprites/phaser-dude.png")
this.load.image("bunny","https://labs.phaser.io/assets/sprites/bunny.png")

this.load.audio("music","https://cdn.pixabay.com/audio/2022/03/15/audio_3a98e1e9e7.mp3")

}

function create(){

this.sound.add("music",{loop:true,volume:0.3}).play()

generateWorld.call(this)

player=this.physics.add.sprite(200,200,"player")

player.setCollideWorldBounds(true)

this.cameras.main.startFollow(player)
this.cameras.main.setZoom(2)

for(let i=0;i<10;i++){

let bunny=this.physics.add.sprite(
Phaser.Math.Between(0,WORLD*TILE),
300,
"bunny")

animals.push(bunny)

}

setupControls()

this.input.on("pointerdown",pointer=>{

mineBlock.call(this,pointer)

})

}

function generateWorld(){

for(let y=0;y<WORLD;y++){

map[y]=[]

for(let x=0;x<WORLD;x++){

let type="air"

if(y>120) type="dirt"
if(y===120) type="grass"
if(y>150) type="stone"

map[y][x]=type

if(type!=="air"){

let block=this.physics.add.staticImage(x*TILE,y*TILE,type)

block.type=type

blocks.push(block)

}

}

}

}

function mineBlock(pointer){

let worldX=pointer.worldX
let worldY=pointer.worldY

blocks.forEach(b=>{

if(
Math.abs(b.x-worldX)<20 &&
Math.abs(b.y-worldY)<20
){

if(b.type==="dirt") inv.stone++
if(b.type==="stone") inv.stone++
if(b.type==="grass") inv.wood++

b.destroy()

}

})

updateInventory()

}

function updateInventory(){

document.getElementById("wood").innerText=inv.wood
document.getElementById("stone").innerText=inv.stone

}

function update(){

if(moveLeft){

player.setVelocityX(-200)

}else if(moveRight){

player.setVelocityX(200)

}else{

player.setVelocityX(0)

}

animals.forEach(a=>{

a.setVelocityX(Math.sin(Date.now()/500)*30)

})

document.getElementById("hp").innerText=hp

}

function setupControls(){

document.getElementById("left").ontouchstart=()=>moveLeft=true
document.getElementById("left").ontouchend=()=>moveLeft=false

document.getElementById("right").ontouchstart=()=>moveRight=true
document.getElementById("right").ontouchend=()=>moveRight=false

document.getElementById("jump").ontouchstart=()=>{

if(player.body.touching.down){

player.setVelocityY(-350)

}

}

}

</script>

</body>
</html>
