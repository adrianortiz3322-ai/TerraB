<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Terraria Pro</title>
  <style>
    body {
      margin: 0;
      overflow: hidden;
      background: linear-gradient(135deg, #1e3c72, #2a5298);
      font-family: 'Arial', sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    #lobbyScreen {
      text-align: center;
      color: white;
      z-index: 10;
    }

    #lobbyScreen h1 {
      font-size: 3em;
      text-shadow: 0 0 10px rgba(0, 0, 0, 0.5);
      margin-bottom: 30px;
    }

    .btn {
      background: #ff6b6b;
      border: none;
      padding: 15px 30px;
      font-size: 1.2em;
      color: white;
      border-radius: 50px;
      cursor: pointer;
      margin: 10px;
      box-shadow: 0 4px 10px rgba(0, 0, 0, 0.3);
      transition: transform 0.2s, background 0.3s;
    }

    .btn:hover {
      background: #ff5252;
      transform: scale(1.05);
    }

    #gameCanvas {
      display: none;
    }
  </style>
</head>
<body>
  <div id="lobbyScreen">
    <h1>Terraria Pro</h1>
    <button class="btn" onclick="startGame()">Jugar</button>
    <button class="btn" onclick="showSettings()">Configuración</button>
  </div>

  <canvas id="gameCanvas"></canvas>

  <div style="display:none;">
    <img src="grass.png">
    <img src="dirt.png">
    <img src="stone.png">
    <img src="sand.png">
    <img src="tree.png">
    <img src="rock.png">
    <img src="player.png">
  </div>

  <script src="sounds.js"></script>
  <script src="game.js"></script>
</body>
</html>
