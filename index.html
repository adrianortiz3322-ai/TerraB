<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Terraria Web</title>

<script src="https://cdn.jsdelivr.net/npm/phaser@3.70.0/dist/phaser.js"></script>

<style>

body{
margin:0;
overflow:hidden;
background:#87CEEB;
font-family:sans-serif;
}

#hud{
position:absolute;
top:10px;
left:10px;
color:white;
font-size:20px;
z-index:10;
}

#inventory{
position:absolute;
bottom:10px;
left:50%;
transform:translateX(-50%);
display:flex;
gap:6px;
}

.slot{
width:50px;
height:50px;
background:rgba(0,0,0,0.5);
border:2px solid white;
color:white;
display:flex;
align-items:center;
justify-content:center;
}

#controls{
position:absolute;
bottom:30px;
left:20px;
z-index:10;
}

.btn{
width:70px;
height:70px;
background:rgba(0,0,0,0.4);
border-radius:50%;
display:flex;
align-items:center;
justify-content:center;
color:white;
font-size:30px;
margin:5px;
}

#jump{
position:absolute;
right:30px;
bottom:60px;
}

</style>
</head>

<body>

<div id="hud">
❤️ <span id="hp">100</span>
</div>

<div id="inventory">
<div class="slot">🟫 <span id="dirt">0</span></div>
<div class="slot">🪨 <span id="stone">0</span></div>
</div>

<div id="controls">
<div class="btn" id="left">◀</div>
<div class="btn" id="right">▶</div>
</div>

<div class="btn" id="jump">⬆</div>

<script>

const TILE=32
const WIDTH=200
const HEIGHT=200
const SURFACE=110

let player
let blocks=[]
let enemies=[]
let animals=[]
let moveLeft=false
let moveRight=false
let hp=100
let time=0

let inventory={
dirt:0,
stone:0
}

const config={
type:Phaser.AUTO,
width:window.innerWidth,
height:window.innerHeight,
physics:{
default:"arcade",
arcade:{gravity:{y:800}}
},
scene:{preload,create,update}
}

new Phaser.Game(config)

function preload(){

this.load.image("grass","https://labs.phaser.io/assets/tilemaps/tiles/grass-1.png")
this.load.image("dirt","https://labs.phaser.io/assets/sprites/crate.png")
this.load.image("stone","https://labs.phaser.io/assets/sprites/stone.png")

this.load.image("enemy","https://labs.phaser.io/assets/sprites/zombie.png")
this.load.image("bunny","https://labs.phaser.io/assets/sprites/bunny.png")

this.load.spritesheet(
"player",
"https://labs.phaser.io/assets/sprites/dude.png",
{frameWidth:32,frameHeight:48}
)

}

function create(){

generateWorld.call(this)

player=this.physics.add.sprite(200,(SURFACE-2)*TILE,"player")

player.setCollideWorldBounds(true)

this.cameras.main.startFollow(player)
this.cameras.main.setZoom(2)

this.anims.create({
key:"walk",
frames:this.anims.generateFrameNumbers("player",{start:0,end:3}),
frameRate:10,
repeat:-1
})

spawnAnimals.call(this)
spawnEnemies.call(this)

setupControls()

this.input.on("pointerdown",pointer=>{
mineBlock(pointer)
})

}

function generateWorld(){

let save=localStorage.getItem("world")

if(save){

map=JSON.parse(save)

}else{

map=[]

for(let x=0;x<WIDTH;x++){

map[x]=[]

for(let y=0;y<HEIGHT;y++){

let type="air"

if(y>SURFACE) type="dirt"
if(y===SURFACE) type="grass"
if(y>SURFACE+12) type="stone"

map[x][y]=type

}

}

localStorage.setItem("world",JSON.stringify(map))

}

for(let x=0;x<WIDTH;x++){

for(let y=0;y<HEIGHT;y++){

let t=map[x][y]

if(t!=="air"){

let b=this.physics.add.staticImage(x*TILE,y*TILE,t)
b.setOrigin(0)
b.type=t
blocks.push(b)

}

}

}

}

function spawnAnimals(){

for(let i=0;i<10;i++){

let bunny=this.physics.add.sprite(
Phaser.Math.Between(0,WIDTH*TILE),
(SURFACE-2)*TILE,
"bunny"
)

animals.push(bunny)

}

}

function spawnEnemies(){

for(let i=0;i<5;i++){

let e=this.physics.add.sprite(
Phaser.Math.Between(0,WIDTH*TILE),
(SURFACE-2)*TILE,
"enemy"
)

enemies.push(e)

}

}

function mineBlock(pointer){

let x=pointer.worldX
let y=pointer.worldY

blocks.forEach(b=>{

if(Math.abs(b.x-x)<20 && Math.abs(b.y-y)<20){

if(b.type==="dirt") inventory.dirt++
if(b.type==="stone") inventory.stone++

b.destroy()

updateInventory()

}

})

}

function updateInventory(){

document.getElementById("dirt").innerText=inventory.dirt
document.getElementById("stone").innerText=inventory.stone

}

function update(){

time+=0.002

this.cameras.main.setBackgroundColor(
Phaser.Display.Color.HSVToRGB(0.6,0.4,0.8+Math.sin(time)*0.2)
)

if(moveLeft){

player.setVelocityX(-200)
player.flipX=true
player.anims.play("walk",true)

}else if(moveRight){

player.setVelocityX(200)
player.flipX=false
player.anims.play("walk",true)

}else{

player.setVelocityX(0)
player.anims.stop()

}

animals.forEach(a=>{
a.setVelocityX(Math.sin(Date.now()/500)*20)
})

enemies.forEach(e=>{

e.setVelocityX(Math.sin(Date.now()/400)*40)

if(Phaser.Math.Distance.Between(e.x,e.y,player.x,player.y)<40){

hp-=0.05

}

})

document.getElementById("hp").innerText=Math.floor(hp)

}

function setupControls(){

document.getElementById("left").ontouchstart=()=>moveLeft=true
document.getElementById("left").ontouchend=()=>moveLeft=false

document.getElementById("right").ontouchstart=()=>moveRight=true
document.getElementById("right").ontouchend=()=>moveRight=false

document.getElementById("jump").ontouchstart=()=>{

if(player.body.touching.down){

player.setVelocityY(-450)

}

}

}

</script>

</body>
</html>
